<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kerala Treasury - App Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f8f9fc;
            min-height: 100vh;
            padding: 30px 20px 40px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header Section - Minimal */
        .header {
            text-align: center;
            margin-bottom: 48px;
            animation: fadeInDown 0.5s ease;
        }

        .header h1 {
            font-size: 2rem;
            color: #1e293b;
            font-weight: 600;
            letter-spacing: -0.3px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 0.95rem;
            color: #64748b;
            font-weight: 400;
        }

        /* Apps Grid - Mobile App Style */
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 140px));
            gap: 32px 24px;
            justify-content: center;
            animation: fadeIn 0.6s ease;
        }

        /* App Card - Like Mobile App Icon */
        .app-card {
            background: transparent;
            cursor: pointer;
            text-align: center;
            transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            text-decoration: none;
            display: block;
        }

        .app-card:hover {
            transform: translateY(-6px);
        }

        /* Icon Container - Mobile App Style */
        .app-icon-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: 120px;
            margin: 0 auto 12px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08), 0 2px 4px rgba(0, 0, 0, 0.02);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .app-card:hover .app-icon-wrapper {
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
            transform: scale(1.02);
        }

        /* Actual Icon Image */
        .app-icon {
            width: 55%;
            height: 55%;
            object-fit: contain;
            transition: transform 0.2s ease;
        }

        .app-card:hover .app-icon {
            transform: scale(1.05);
        }

        /* Default Icon (when no logo URL) */
        .default-icon {
            width: 55%;
            height: 55%;
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-weight: 600;
            box-shadow: 0 4px 8px rgba(59,130,246,0.2);
            transition: transform 0.2s ease;
        }

        .app-card:hover .default-icon {
            transform: scale(1.05);
        }

        /* App Name */
        .app-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e293b;
            margin-bottom: 4px;
            line-height: 1.3;
            word-break: break-word;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        /* Hidden path - not shown in this design */
        .app-path {
            display: none;
        }

        /* No description visible - clean app icon style */
        .app-description {
            display: none;
        }

        /* Launch Button - Hidden, card itself is clickable */
        .launch-btn {
            display: none;
        }

        /* Loading & Error States */
        .loading-state, .error-state, .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            max-width: 400px;
            margin: 40px auto;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid #e2e8f0;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 18px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Footer - Minimal */
        .footer {
            text-align: center;
            margin-top: 56px;
            padding-top: 24px;
            color: #94a3b8;
            font-size: 0.75rem;
            border-top: 1px solid rgba(0,0,0,0.06);
        }

        /* Responsive adjustments */
        @media (max-width: 640px) {
            body {
                padding: 20px 16px 32px;
            }
            
            .header h1 {
                font-size: 1.7rem;
            }
            
            .apps-grid {
                grid-template-columns: repeat(auto-fill, minmax(90px, 100px));
                gap: 24px 16px;
            }
            
            .app-icon-wrapper {
                border-radius: 20px;
            }
            
            .app-name {
                font-size: 0.75rem;
            }
            
            .default-icon {
                font-size: 26px;
            }
        }

        @media (min-width: 1024px) {
            .apps-grid {
                gap: 40px 32px;
            }
        }

        /* Optional: subtle ripple effect on click */
        .app-card:active .app-icon-wrapper {
            transform: scale(0.96);
            transition: transform 0.1s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 App Portal</h1>
           
        </div>
        
        <div id="apps-container">
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Loading applications...</p>
            </div>
        </div>
        
        <div class="footer">
            <p>© 2026 Kerala Treasury</p>
        </div>
    </div>

    <script>
        // Path to the apps configuration file
        const APPS_CONFIG_URL = './apps.txt';
        
        // Default descriptions - kept for internal use but not displayed
        function getDefaultDescription(appName) {
            return `${appName} application`;
        }
        
        // Fetch and parse apps.txt
        async function loadApplications() {
            const container = document.getElementById('apps-container');
            
            try {
                const response = await fetch(APPS_CONFIG_URL);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const text = await response.text();
                const lines = text.split('\n').filter(line => line.trim() && !line.startsWith('#'));
                
                const apps = [];
                
                for (const line of lines) {
                    const parts = line.split(',').map(part => part.trim());
                    if (parts.length >= 2) {
                        const appName = parts[0];
                        const appPath = parts[1];
                        const logoUrl = parts.length >= 3 && parts[2] ? parts[2] : null;
                        
                        apps.push({
                            name: appName,
                            path: appPath,
                            logoUrl: logoUrl,
                            description: getDefaultDescription(appName)
                        });
                    }
                }
                
                if (apps.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <p style="margin-bottom: 12px;">📂 No applications configured</p>
                            <p style="font-size: 0.85rem; color: #64748b;">Add entries to apps.txt file</p>
                        </div>
                    `;
                    return;
                }
                
                // Render mobile-style app grid
                renderAppsGrid(container, apps);
                
            } catch (error) {
                console.error('Error loading apps:', error);
                container.innerHTML = `
                    <div class="error-state">
                        <p style="margin-bottom: 12px;">⚠️ Could not load apps</p>
                        <p style="font-size: 0.85rem; color: #64748b;">Make sure apps.txt exists in /apps/ folder</p>
                        <p style="font-size: 0.75rem; color: #94a3b8; margin-top: 12px;">${error.message}</p>
                    </div>
                `;
            }
        }
        
        function renderAppsGrid(container, apps) {
            const cardsHtml = `
                <div class="apps-grid">
                    ${apps.map(app => `
                        <div class="app-card" onclick="openApp('${escapeJsString(app.path)}')">
                            <div class="app-icon-wrapper">
                                ${app.logoUrl ? 
                                    `<img src="${escapeHtml(app.logoUrl)}" alt="${escapeHtml(app.name)}" class="app-icon" 
                                        onerror="this.style.display='none'; this.parentElement.querySelector('.default-icon').style.display='flex';">` : 
                                    ''
                                }
                                <div class="default-icon" ${app.logoUrl ? 'style="display: none;"' : ''}>
                                    ${escapeHtml(app.name.charAt(0).toUpperCase())}
                                </div>
                            </div>
                            <div class="app-name">${escapeHtml(app.name)}</div>
                            <div class="app-path">${escapeHtml(app.path)}</div>
                            <div class="app-description">${escapeHtml(app.description)}</div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            container.innerHTML = cardsHtml;
        }
        
        function openApp(path) {
            // Open in new tab
            window.open(path, '_blank', 'noopener,noreferrer');
        }
        
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        
        function escapeJsString(str) {
            return str.replace(/'/g, "\\'").replace(/"/g, '\\"');
        }
        
        // Load applications when page loads
        loadApplications();
    </script>
</body>
</html>
